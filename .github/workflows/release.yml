# Automatically creates a release when a PR is merged to main.
#
# Version increment is inferred from conventional commit messages since the last tag:
#   - "BREAKING CHANGE" or "!:" anywhere -> major
#   - "feat:" prefix -> minor
#   - Everything else -> patch
#
# PREREQUISITES
#
# A Personal Access Token with repo write access is required so release-it can
# push the version bump commit and tag to the default branch.
#
# 1. GitHub -> Settings -> Developer settings -> Personal access tokens
# 2. Create token with repository write access
# 3. Repo -> Settings -> Secrets and variables -> Actions -> New repository secret
#    Name: RELEASE_TOKEN   Value: <the token>
#
# If your default branch has PR-only rules, allow this actor as a bypass actor
# in the branch ruleset, or this workflow's push/tag step will be blocked.

name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Auto-release on merge
    runs-on: ubuntu-latest

    # Skip release commits produced by this workflow itself.
    if: "!startsWith(github.event.head_commit.message, 'Release ')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use PAT so the push of the version bump commit/tag is allowed.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version increment
        id: increment
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s %b")
          else
            COMMITS=$(git log --pretty=format:"%s %b" "${LAST_TAG}..HEAD")
          fi

          if echo "$COMMITS" | grep -qiE "(BREAKING CHANGE|!:)"; then
            echo "increment=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?[!]?:"; then
            echo "increment=minor" >> "$GITHUB_OUTPUT"
          else
            echo "increment=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Run release-it
        run: npx release-it --ci --increment=${{ steps.increment.outputs.increment }}
