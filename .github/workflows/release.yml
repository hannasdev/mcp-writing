# Automatically creates a release when a PR is merged to main.
#
# Version increment is inferred from conventional commit messages since the last tag:
#   - "BREAKING CHANGE" or "!:" anywhere -> major
#   - "feat:" prefix -> minor
#   - Everything else -> patch
#
# PREREQUISITES
#
# A deploy key with write access is required so release-it can push the version
# bump commit and tag to the default branch over SSH.
#
# 1. Generate an SSH keypair dedicated to release automation
# 2. Add the public key as a repository deploy key with write access enabled
# 3. Repo -> Settings -> Secrets and variables -> Actions -> New repository secret
#    Name: RELEASE_DEPLOY_KEY   Value: <private key>
# 4. (Optional) Add RELEASE_DEPLOY_KNOWN_HOSTS with ssh-keyscan output for hosts
#    you require beyond GitHub.com.
#
# If your default branch has PR-only rules, allow the Deploy Key actor as a
# bypass actor in the branch ruleset, or this workflow's push/tag step fails.

name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Auto-release on merge
    runs-on: ubuntu-latest

    # Skip release commits produced by this workflow itself.
    if: "!startsWith(github.event.head_commit.message, 'Release ')"

    steps:
      - name: Validate release deploy key
        env:
          RELEASE_DEPLOY_KEY: ${{ secrets.RELEASE_DEPLOY_KEY }}
        run: |
          if [ -z "$RELEASE_DEPLOY_KEY" ]; then
            echo "Error: RELEASE_DEPLOY_KEY is not set."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          # Use SSH deploy key so branch-rule bypass is scoped to deploy key actor.
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}
          ssh-known-hosts: ${{ secrets.RELEASE_DEPLOY_KNOWN_HOSTS }}
          ssh-strict: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate package version against latest tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            exit 0
          fi

          PACKAGE_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          TAG_VERSION="${LAST_TAG#v}"

          node - "$PACKAGE_VERSION" "$TAG_VERSION" <<'NODE'
          const [pkg, tag] = process.argv.slice(2);

          function compareSemver(left, right) {
            const leftParts = left.split('.').map(Number);
            const rightParts = right.split('.').map(Number);
            for (let index = 0; index < 3; index += 1) {
              const delta = (leftParts[index] ?? 0) - (rightParts[index] ?? 0);
              if (delta !== 0) return Math.sign(delta);
            }
            return 0;
          }

          const comparison = compareSemver(pkg, tag);
          if (comparison < 0) {
            console.error(`package.json version ${pkg} is behind latest tag ${tag}.`);
            console.error('This usually means a stale workflow rerun after a tag was already published.');
            console.error('Do not rerun the old release job; trigger release from current main instead.');
            process.exit(1);
          }
          NODE

      - name: Determine version increment
        id: increment
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s %b")
          else
            COMMITS=$(git log --pretty=format:"%s %b" "${LAST_TAG}..HEAD")
          fi

          if echo "$COMMITS" | grep -qiE "(BREAKING CHANGE|!:)"; then
            echo "increment=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?[!]?:"; then
            echo "increment=minor" >> "$GITHUB_OUTPUT"
          else
            echo "increment=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Run release-it
        run: npx release-it --ci --increment=${{ steps.increment.outputs.increment }}
