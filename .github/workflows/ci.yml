name: CI

on:
  push:
    branches:
      - main
      - release-please--branches--**
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Release ')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  lint:
    name: Lint
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Release ')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  legacy-root-import-guard:
    name: Legacy Root Import Guard
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Release ')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for legacy root-module imports
        run: npm run guard:legacy-root-imports

  docs:
    name: Generated Docs
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Release ')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate tool reference
        run: npm run docs

      - name: Verify generated docs are committed
        run: git diff --exit-code -- docs/tools.md
