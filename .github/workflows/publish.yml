name: Publish package and MCP Registry metadata

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish_npm:
    name: npm publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      deployments: write
    environment:
      name: npm
      url: https://www.npmjs.com/package/@hanna84/mcp-writing

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish_mcp_registry:
    name: MCP Registry publish
    needs: publish_npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Sync server.json version to tag
        run: node scripts/sync-server-json-version.mjs "${GITHUB_REF#refs/tags/v}"

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
